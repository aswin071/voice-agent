# SpeedCare Voice Agent - Docker Compose
# Local development environment with PostgreSQL and Redis

version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: speedcare_postgres
    environment:
      POSTGRES_USER: speedcare
      POSTGRES_PASSWORD: speedcare
      POSTGRES_DB: speedcare
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speedcare -d speedcare"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - speedcare_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: speedcare_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - speedcare_network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: speedcare_api
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql+asyncpg://speedcare:speedcare@postgres:5432/speedcare
      - REDIS_URL=redis://redis:6379/0
      - SENTRY_DSN=${SENTRY_DSN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app:ro
    networks:
      - speedcare_network
    restart: unless-stopped

  # LiveKit Voice Agent Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: speedcare_worker
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql+asyncpg://speedcare:speedcare@postgres:5432/speedcare
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./:/app:ro
    networks:
      - speedcare_network
    restart: unless-stopped
    # Run in privileged mode for audio processing (optional, may be needed for some VAD features)
    # privileged: true

  # Combined service (for simpler setups - runs both API and Worker)
  # Uncomment to use instead of separate api + worker services
  # combined:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: combined
  #   container_name: speedcare_combined
  #   env_file:
  #     - .env.local
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://speedcare:speedcare@postgres:5432/speedcare
  #     - REDIS_URL=redis://redis:6379/0
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./:/app:ro
  #   networks:
  #     - speedcare_network
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  speedcare_network:
    driver: bridge
